<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourism Explorer | Hotéis de Malanje - Portal Turístico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', Times, serif;
            background: radial-gradient(circle at 10% 30%, #0e2a3a, #05161f);
            min-height: 100vh;
            color: #f5f9ff;
        }
        .glass-card {
            background: rgba(20, 40, 55, 0.6);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            transition: 0.2s;
        }
        .glass-card:hover { border-color: #4c9aff; transform: translateY(-4px); }
        .hotel-card { cursor: pointer; }
        .rating-star { color: #ffcc00; }
        .section-detail { display: none; }
        .active-detail { display: block; }
        .preview-img-grid img { width: 100px; height: 80px; object-fit: cover; border-radius: 12px; margin: 5px; }
        footer { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
<div class="container-fluid px-3 px-md-4 py-3">
    <div class="glass-card p-3 mb-4 d-flex justify-content-between align-items-center flex-wrap">
        <div><i class="fas fa-globe-africa fa-2x me-2"></i><span class="fs-2 fw-bold">Malanje<span style="color:#7bc5ff;">Turismo</span></span><span class="badge bg-warning ms-2"><i class="fas fa-users"></i> Portal do Viajante</span></div>
        <div><i class="fas fa-tree"></i> Descubra a natureza e cultura</div>
    </div>

    <!-- LISTA DE HOTÉIS -->
    <div id="hotelListSection">
        <div class="row" id="hotelsContainer"></div>
    </div>

    <!-- DETALHE DO HOTEL (escondido inicialmente) -->
    <div id="hotelDetailSection" style="display:none;">
        <button class="btn btn-secondary mb-3" id="backToListBtn"><i class="fas fa-arrow-left"></i> Voltar aos Hotéis</button>
        <div id="hotelDetailContent"></div>
    </div>
</div>
<footer class="text-center py-3 mt-4"><i class="fas fa-comment-dots"></i> Envie mensagens, avalie e conecte-se com os hotéis em tempo real</footer>

<script>
    // Carrega os mesmos dados do localStorage (partilhado com o backoffice)
    let hotelData = null;
    function loadSharedData() {
        const stored = localStorage.getItem("hotelSphereDB");
        if(stored) {
            try { hotelData = JSON.parse(stored); } catch(e) { hotelData = null; }
        }
        if(!hotelData) {
            // Fallback básico caso backoffice ainda não tenha criado dados
            hotelData = {
                rooms: [{ id: "r1", name: "Suite Presidencial", type: "Luxo", price: 250, description: "Vista incrível", available: true, images: [] }],
                dishes: [{ id: "d1", name: "Muamba de Galinha", category: "Angolana", description: "Sabor tradicional", price: 1800, images: [] }],
                services: { pool: true, spa: true, gym: false, restaurant: true, wifi: true, transport: false },
                experiences: [{ id: "e1", name: "Quedas Kalandula", description: "Tour guiado", price: 12000 }],
                gallery: ["https://picsum.photos/id/164/400/250", "https://picsum.photos/id/29/300/200"],
                messages: [],
                hotelStyle: { primaryColor: "#0a1a2a", blurPx: "16" }
            };
        }
        renderHotelList();
    }

    function renderHotelList() {
        const container = document.getElementById("hotelsContainer");
        // Simulamos um hotel principal (sistema multi-hotel pode ser expandido)
        container.innerHTML = `
            <div class="col-md-8 offset-md-2">
                <div class="glass-card hotel-card p-4 text-center" onclick="showHotelDetail()">
                    <img src="https://picsum.photos/id/164/600/300" class="img-fluid rounded mb-3" alt="Hotel Vista Kwanza">
                    <h2><i class="fas fa-hotel"></i> Hotel Vista Kwanza - Malanje</h2>
                    <div><i class="fas fa-star rating-star"></i><i class="fas fa-star rating-star"></i><i class="fas fa-star rating-star"></i><i class="fas fa-star rating-star"></i><i class="fas fa-star-half-alt rating-star"></i> 4.7 (128 avaliações)</div>
                    <p class="mt-2">O melhor da hospitalidade angolana, integrado na natureza e cultura local.</p>
                    <button class="btn btn-outline-light mt-2"><i class="fas fa-binoculars"></i> Explorar Hotel</button>
                </div>
            </div>`;
    }

    window.showHotelDetail = function() {
        document.getElementById("hotelListSection").style.display = "none";
        document.getElementById("hotelDetailSection").style.display = "block";
        const detailDiv = document.getElementById("hotelDetailContent");
        if(!hotelData) loadSharedData();
        detailDiv.innerHTML = `
            <div class="glass-card p-4">
                <h2><i class="fas fa-building"></i> Hotel Vista Kwanza</h2>
                <div class="row mt-4">
                    <div class="col-md-6">
                        <h4><i class="fas fa-bed"></i> Quartos & Tarifas</h4>
                        ${hotelData.rooms.map(r => `<div class="mb-2 p-2 glass-card"><b>${r.name}</b> - ${r.type}<br>💰 ${r.price} KZ / noite<br>${r.description}<br>${r.available ? '<span class="badge bg-success">Disponível</span>' : '<span class="badge bg-secondary">Indisponível</span>'}</div>`).join("")}
                    </div>
                    <div class="col-md-6">
                        <h4><i class="fas fa-utensils"></i> Gastronomia Típica</h4>
                        ${hotelData.dishes.map(d => `<div class="mb-2"><i class="fas fa-drumstick-bite"></i> <strong>${d.name}</strong> (${d.category}) - ${d.price} KZ<br>${d.description}</div>`).join("")}
                    </div>
                </div>
                <hr>
                <h4><i class="fas fa-concierge-bell"></i> Serviços Premium</h4>
                <div class="d-flex flex-wrap gap-2 mb-3">
                    ${Object.keys(hotelData.services).filter(s=>hotelData.services[s]).map(s => `<span class="badge bg-info fs-6 p-2"><i class="fas fa-check-circle"></i> ${s.toUpperCase()}</span>`).join("")}
                </div>
                <h4><i class="fas fa-hiking"></i> Experiências Turísticas</h4>
                <div class="row mb-3">
                    ${hotelData.experiences.map(exp => `<div class="col-md-4"><div class="glass-card p-2 mb-2"><i class="fas fa-tree"></i> ${exp.name}<br>${exp.description}<br><strong>${exp.price} KZ</strong></div></div>`).join("")}
                </div>
                <h4><i class="fas fa-images"></i> Galeria do Hotel</h4>
                <div class="preview-img-grid d-flex flex-wrap mb-3">
                    ${hotelData.gallery.map(img => `<img src="${img}" class="img-thumbnail me-2" style="width:100px; height:80px; object-fit:cover;">`).join("")}
                </div>
                <hr>
                <h4><i class="fas fa-comment"></i> Interaja connosco</h4>
                <textarea id="visitorMessage" class="form-control mb-2" rows="3" placeholder="Escreva a sua mensagem para o hotel..."></textarea>
                <div class="mb-2"><label>Avaliação: </label>
                    <select id="visitorRating" class="form-select w-25 d-inline-block w-auto"><option>5⭐</option><option>4⭐</option><option>3⭐</option><option>2⭐</option><option>1⭐</option></select>
                    <button class="btn btn-primary ms-2" id="submitInteractionBtn"><i class="fas fa-paper-plane"></i> Enviar Mensagem</button>
                    <button class="btn btn-success ms-2" id="simulateBookingBtn"><i class="fas fa-calendar-check"></i> Simular Reserva</button>
                </div>
                <div id="frontFeedback" class="mt-2"></div>
                <div class="mt-3"><small><i class="fas fa-clock"></i> Respostas em tempo real - equipa disponível</small></div>
            </div>
        `;
        document.getElementById("submitInteractionBtn")?.addEventListener("click", () => {
            let msg = document.getElementById("visitorMessage").value;
            let rating = document.getElementById("visitorRating").value;
            if(msg) {
                let newMsg = { id: "msg"+Date.now(), from: "Turista Web", text: msg + " [Avaliação: "+rating+"]", date: new Date().toISOString(), replied: false };
                hotelData.messages.push(newMsg);
                localStorage.setItem("hotelSphereDB", JSON.stringify(hotelData));
                document.getElementById("frontFeedback").innerHTML = "<div class='alert alert-success'>✅ Mensagem enviada! O hotel responderá em breve.</div>";
                document.getElementById("visitorMessage").value = "";
                // força atualização backoffice via storage event
                window.dispatchEvent(new Event("storage"));
            } else alert("Escreva uma mensagem antes de enviar.");
        });
        document.getElementById("simulateBookingBtn")?.addEventListener("click",()=>{
            document.getElementById("frontFeedback").innerHTML = "<div class='alert alert-info'>📅 Pedido de reserva simulado! O hotel recebeu a solicitação.</div>";
            let notifMsg = { id: "not"+Date.now(), from: "Sistema", text: "Turista solicitou reserva (simulação).", date: new Date().toISOString(), replied: false };
            hotelData.messages.push(notifMsg);
            localStorage.setItem("hotelSphereDB", JSON.stringify(hotelData));
            window.dispatchEvent(new Event("storage"));
        });
    };

    document.getElementById("backToListBtn")?.addEventListener("click", () => {
        document.getElementById("hotelDetailSection").style.display = "none";
        document.getElementById("hotelListSection").style.display = "block";
        renderHotelList();
    });

    // Escuta atualizações em tempo real via storage (quando backoffice altera)
    window.addEventListener("storage", (e) => {
        if(e.key === "hotelSphereDB") {
            loadSharedData();
            if(document.getElementById("hotelDetailSection").style.display === "block") {
                showHotelDetail();  // recarrega detalhe com dados frescos
            }
        }
    });

    loadSharedData();
    // Polling extra para sincronia máxima
    setInterval(() => { loadSharedData(); if(document.getElementById("hotelDetailSection").style.display === "block") showHotelDetail(); }, 4000);
</script>
</body>
</html>

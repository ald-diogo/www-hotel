<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Institucional - Turismo Malanje</title>
    <!-- Font Awesome 6 (Gratuita) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
            padding: 20px;
            position: relative;
        }

        /* ===== BACKGROUND COM IMAGEM DE MALANJE ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="%232c3e50"/><circle cx="200" cy="150" r="80" fill="%233498db" opacity="0.3"/><circle cx="600" cy="450" r="100" fill="%232ecc71" opacity="0.2"/><path d="M0 400 Q200 300 400 400 T800 400 L800 600 L0 600 Z" fill="%231a2a3a" opacity="0.4"/><path d="M100 350 Q300 250 500 350 T700 350" stroke="%23ecf0f1" stroke-width="2" fill="none" opacity="0.1"/><rect x="250" y="100" width="300" height="400" fill="%233498db" opacity="0.1" rx="10"/></svg>');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== CARD GLASSMORPHISM ===== */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        /* ===== ÍCONE DO CADEADO (Font Awesome) ===== */
        .lock-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .lock-icon span {
            display: inline-block;
            background: rgba(52, 152, 219, 0.2);
            padding: 15px;
            border-radius: 50%;
            border: 2px solid rgba(52, 152, 219, 0.4);
            color: #fff;
        }

        /* ===== TÍTULOS ===== */
        .title {
            color: #fff;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* ===== LABEL DO CAMPO ===== */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-group label .icon {
            margin-right: 8px;
            color: #3498db;
        }

        /* ===== CAMPO DE SENHA ===== */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .password-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .password-wrapper input:focus {
            border-color: #3498db;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
        }

        .password-wrapper input.error {
            border-color: #e74c3c;
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.15);
        }

        .password-wrapper input.success {
            border-color: #2ecc71;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.15);
        }

        /* ===== BOTÃO MOSTRAR SENHA (Font Awesome) ===== */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            transition: color 0.3s ease;
            border-radius: 6px;
        }

        .toggle-password:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.05);
        }

        /* ===== MENSAGEM DE ERRO ===== */
        .message {
            margin-top: 8px;
            font-size: 13px;
            min-height: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message.error {
            color: #e74c3c;
        }

        .message.success {
            color: #2ecc71;
        }

        /* ===== BOTÕES ===== */
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(52, 152, 219, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* ===== LINK RECUPERAR SENHA ===== */
        .recover-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .recover-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .recover-link:hover {
            color: #25d366;
            transform: scale(1.02);
        }

        .recover-link .whatsapp-icon {
            background: #25d366;
            color: #fff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        .recover-link:hover .whatsapp-icon {
            transform: scale(1.1);
        }

        .recover-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 8px;
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            .title {
                font-size: 22px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                padding: 16px;
                font-size: 15px;
            }

            .lock-icon {
                font-size: 36px;
            }
        }

        /* ===== SPINNER DE CARREGAMENTO ===== */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== CHAVE CORRETA (DEMONSTRAÇÃO) ===== */
        /* A CHAVE PERMANENTE É: "Malanje2026" */
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Ícone com Font Awesome -->
            <div class="lock-icon">
                <span><i class="fas fa-lock"></i></span>
            </div>

            <!-- Títulos -->
            <h1 class="title">Acesso Institucional</h1>
            <p class="subtitle">
                Área restrita destinada aos responsáveis pela gestão<br>
                da plataforma turística de Malanje.
            </p>

            <!-- Formulário -->
            <form id="accessForm" autocomplete="off">
                <div class="input-group">
                    <label for="accessKey">
                        <span class="icon"><i class="fas fa-key"></i></span> Chave de Acesso Institucional
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="accessKey" 
                            placeholder="Digite a chave de acesso"
                            required
                            autofocus
                        >
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar chave">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="message" class="message"></div>
                </div>

                <!-- Botões -->
                <div class="buttons">
                    <button type="submit" class="btn btn-primary" id="validateBtn">
                        <i class="fas fa-check"></i> Validar Chave
                    </button>
                    <button type="reset" class="btn btn-secondary" id="cancelBtn">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                </div>
            </form>

            <!-- Link Recuperar Senha via WhatsApp -->
            <div class="recover-section">
                <a href="#" class="recover-link" id="whatsappLink">
                    <span class="whatsapp-icon"><i class="fab fa-whatsapp"></i></span>
                    Esqueceu a chave? Recupere pelo WhatsApp
                </a>
                <p class="recover-text">
                    A chave é permanente. Em caso de esquecimento, solicite a recuperação via WhatsApp.
                </p>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURAÇÃO =====
        // CHAVE PERMANENTE (hardcoded para demonstração)
        const CHAVE_PERMANENTE = "Malanje2026";

        // NÚMERO DO WHATSAPP (código Angola +244)
        const WHATSAPP_NUMERO = "244921151685";
        const WHATSAPP_MENSAGEM = "Olá! Solicito a recuperação da chave de acesso institucional da plataforma de turismo de Malanje.";

        // ===== ELEMENTOS DOM =====
        const form = document.getElementById('accessForm');
        const keyInput = document.getElementById('accessKey');
        const messageEl = document.getElementById('message');
        const validateBtn = document.getElementById('validateBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const togglePassword = document.getElementById('togglePassword');
        const whatsappLink = document.getElementById('whatsappLink');

        // ===== CONFIGURAR LINK WHATSAPP =====
        function setupWhatsAppLink() {
            const mensagemCodificada = encodeURIComponent(WHATSAPP_MENSAGEM);
            whatsappLink.href = `https://wa.me/${WHATSAPP_NUMERO}?text=${mensagemCodificada}`;
            whatsappLink.target = '_blank';
            whatsappLink.rel = 'noopener noreferrer';
        }
        setupWhatsAppLink();

        // ===== MOSTRAR/ESCONDER SENHA =====
        let isPasswordVisible = false;
        togglePassword.addEventListener('click', function() {
            isPasswordVisible = !isPasswordVisible;
            keyInput.type = isPasswordVisible ? 'text' : 'password';
            
            // Trocar ícone do olho
            const icon = this.querySelector('i');
            if (isPasswordVisible) {
                icon.className = 'fas fa-eye-slash';
                this.setAttribute('aria-label', 'Ocultar chave');
            } else {
                icon.className = 'fas fa-eye';
                this.setAttribute('aria-label', 'Mostrar chave');
            }
        });

        // ===== VALIDAÇÃO DA CHAVE =====
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const chave = keyInput.value.trim();
            
            // Resetar estado
            keyInput.classList.remove('error', 'success');
            messageEl.className = 'message';
            validateBtn.disabled = true;
            validateBtn.innerHTML = '<span class="spinner"></span> Validando...';

            // Simular delay de processamento (200ms)
            setTimeout(() => {
                // Validar chave
                if (chave === CHAVE_PERMANENTE) {
                    // ✅ SUCESSO - REDIRECIONAR PARA login-admin.html
                    keyInput.classList.add('success');
                    messageEl.className = 'message success';
                    messageEl.innerHTML = '<i class="fas fa-check-circle"></i> Chave validada com sucesso! Redirecionando...';
                    
                    // Redirecionar para login-admin.html após 1.2 segundos
                    setTimeout(() => {
                        window.location.href = "login-admin.html";
                    }, 1200);
                    
                } else {
                    // ❌ ERRO
                    keyInput.classList.add('error');
                    messageEl.className = 'message error';
                    messageEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Chave de acesso inválida. Tente novamente.';
                    
                    // Limpar campo e focar
                    keyInput.value = '';
                    keyInput.focus();
                    
                    // Reativar botão
                    validateBtn.disabled = false;
                    validateBtn.innerHTML = '<i class="fas fa-check"></i> Validar Chave';
                }
            }, 600);
        });

        // ===== CANCELAR =====
        cancelBtn.addEventListener('click', function(e) {
            e.preventDefault();
            keyInput.value = '';
            keyInput.classList.remove('error', 'success');
            messageEl.className = 'message';
            messageEl.innerHTML = '';
            keyInput.focus();
            validateBtn.disabled = false;
            validateBtn.innerHTML = '<i class="fas fa-check"></i> Validar Chave';
        });

        // ===== LIMITAR TENTATIVAS (simples) =====
        let tentativas = 0;
        const MAX_TENTATIVAS = 5;

        keyInput.addEventListener('input', function() {
            // Remover estado de erro ao digitar
            if (this.classList.contains('error')) {
                this.classList.remove('error');
                messageEl.className = 'message';
                messageEl.innerHTML = '';
            }
        });

        // ===== VALIDAÇÃO ADICIONAL: ENTER =====
        keyInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // ===== FOCAR CAMPO AO CARREGAR =====
        window.addEventListener('load', function() {
            setTimeout(() => {
                keyInput.focus();
            }, 300);
        });

        // ===== DEMONSTRAÇÃO: MOSTRAR CHAVE NO CONSOLE =====
        console.log('🔑 CHAVE DE ACESSO INSTITUCIONAL (para teste):', CHAVE_PERMANENTE);
        console.log('📱 Recuperação via WhatsApp:', whatsappLink.href);
        console.log('📄 Página de redirecionamento: login-admin.html');
    </script>
</body>
</html>

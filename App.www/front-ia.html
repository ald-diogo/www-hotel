<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Splash Screen com Vídeo</title>
    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Garante que o body ocupe a tela toda e remova margens */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* evita scroll durante o splash */
        }
        /* Container do vídeo cobre toda a janela */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000; /* fundo preto enquanto carrega */
            
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000; /* fundo preto para as barras */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Vídeo responsivo: mostra o conteúdo inteiro sem cortes (contain) */
        #splashVideo {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ALTERADO: de 'cover' para 'contain' – vídeo totalmente visível */
        }
        /* Opcional: pequeno texto de carregamento ou overlay (apenas estético) */
        .overlay-message {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            font-size: 14px;
            font-family: sans-serif;
            pointer-events: none; /* permite clicar através para o vídeo */
        }
        /* Botão de controle de som - posicionado sem interferir no redirecionamento */
        .sound-control {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }
        .sound-control:hover {
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <!-- 
        Vídeo de exemplo (Big Buck Bunny curto, domínio público da Blender)
        Troque o 'src' pelo seu vídeo se quiser.
        Atributos:
          - autoplay: inicia automaticamente
          - playsinline: evita fullscreen automático no iOS
          - preload: carrega o vídeo o quanto antes
          - O atributo "muted" foi REMOVIDO para que o vídeo inicie COM SOM adaptado
    -->
    <video id="splashVideo" autoplay playsinline preload="auto">
        <source src="video/apresentacao.mp4" type="video/mp4">
    </video>
    
    <!-- Botão para mutar/desmutar o som (inicia com som ativo) -->
    <button id="soundToggle" class="sound-control" title="Desativar som">🔊</button>
</div>

<!-- Bootstrap JS (opcional para alguma interação, mas incluído como pedido) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Aguarda o DOM carregar e garante o evento de fim do vídeo
    document.addEventListener('DOMContentLoaded', function() {
        const video = document.getElementById('splashVideo');
        const soundBtn = document.getElementById('soundToggle');
        
        // Função de redirecionamento
        function redirectToLogin() {
            window.location.href = 'ia.html';
        }
        
        // Função para alternar o som (toggle mutar/desmutar)
        function toggleSound() {
            if (video.muted) {
                video.muted = false;
                soundBtn.innerHTML = '🔊';
                soundBtn.title = 'Desativar som';
            } else {
                video.muted = true;
                soundBtn.innerHTML = '🔇';
                soundBtn.title = 'Ativar som';
            }
        }
        
        // Evento de clique no botão para alternar o som
        soundBtn.addEventListener('click', toggleSound);
        
        // Como o vídeo agora inicia sem muted, garantimos que o mute fique false
        video.muted = false;
        
        // Se o vídeo já estiver terminado (caso muito curto ou já no fim)
        if (video.ended) {
            redirectToLogin();
        } else {
            // Adiciona evento para quando o vídeo terminar
            video.addEventListener('ended', redirectToLogin);
            
            // Fallback: caso o vídeo demore a carregar ou não dispare 'ended' (ex: erro)
            // Define um timeout máximo de 15 segundos como segurança (opcional)
            setTimeout(function() {
                if (!video.ended) {
                    console.warn("Timeout: forçando redirecionamento após 15s");
                    redirectToLogin();
                }
            }, 15000);
        }
        
        // Tratamento de erro no carregamento do vídeo: redireciona também
        video.addEventListener('error', function() {
            console.error("Erro ao carregar vídeo. Redirecionando...");
            redirectToLogin();
        });
        
        // Pequeno auxílio: tenta reproduzir explicitamente (caso algum navegador bloqueie)
        // e, se houver erro por política de autoplay com som, exibe um aviso discreto.
        video.play().catch(function(e) {
            console.warn("Autoplay com som bloqueado pelo navegador. O usuário precisará clicar no botão para ativar o som?");
            // Como o botão já está visível e o vídeo pode estar pausado, tentamos novamente
            // com um clique em qualquer lugar da página (opção não intrusiva).
            const onFirstInteraction = function() {
                video.play().catch(() => {});
                document.removeEventListener('click', onFirstInteraction);
                document.removeEventListener('touchstart', onFirstInteraction);
            };
            document.addEventListener('click', onFirstInteraction);
            document.addEventListener('touchstart', onFirstInteraction);
        });
    });
</script>
</body>
</html>
